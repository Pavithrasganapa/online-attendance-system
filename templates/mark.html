<!DOCTYPE html>
<html>
<head>
  <title>Mark Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">

    <h2 class="text-center text-success">✅ Mark Attendance</h2>

    <form method="POST" class="mt-4">

      {% for s in students %}
      <div class="d-flex justify-content-between align-items-center border p-2 mb-2 rounded">
        <strong>{{ s[1] }}</strong>

        <div>
          <input type="radio" name="{{ s[0] }}" value="Present" required> Present
          <input type="radio" name="{{ s[0] }}" value="Absent"> Absent
        </div>
      </div>
      {% endfor %}

      <div class="text-center mt-3">
        <button class="btn btn-success">Submit Attendance</button>
      </div>

    </form>

  </div>
</div>

</body>
</html>
