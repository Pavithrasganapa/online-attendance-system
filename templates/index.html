<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    
    <h2 class="text-center text-primary">📘 Student Attendance System</h2>

    <form method="POST" class="mt-4">
      <div class="input-group">
        <input name="name" class="form-control" placeholder="Enter student name" required>
        <button class="btn btn-success">Add Student</button>
      </div>
    </form>

    <h4 class="mt-4">Student List</h4>
    <ul class="list-group">
      {% for s in students %}
        <li class="list-group-item">{{ s[1] }}</li>
      {% endfor %}
    </ul>

    <div class="text-center mt-4">
      <a href="/mark" class="btn btn-primary">Mark Attendance</a>
    </div>

  </div>
</div>

</body>
</html>
