<!DOCTYPE html>
<html>
<head>
<title>Report</title>
</head>
<body>

<h2>Attendance Report</h2>

<table border="1">
<tr>
  <th>Name</th>
  <th>Status</th>
  <th>Date</th>
</tr>

{% for r in records %}
<tr>
  <td>{{ r[0] }}</td>
  <td>{{ r[1] }}</td>
  <td>{{ r[2] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
